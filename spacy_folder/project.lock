create-config:
  cmd: python -m weasel run create-config
  script:
    - python scripts/create_config.py en_core_web_sm ner configs/config.cfg
  deps:
    - path: scripts/create_config.py
      md5: 690ed80ea95bb4a9f087f04be57c1b14
  outs:
    - path: configs/config.cfg
      md5: 3cca7cc068e5302121dd239386824faf
train:
  cmd: python -m weasel run train
  script:
    - python -m spacy train configs/config.cfg --output training/ --paths.train corpus/train.spacy
      --paths.dev corpus/dev.spacy --training.eval_frequency 10 --training.max_steps
      500 --training.patience 50 --gpu-id -1 -c ./scripts/custom_functions.py
  deps:
    - path: configs/config.cfg
      md5: d04171697b3a73f92d8234642309f160
    - path: corpus/train.spacy
      md5: 7b030d002626686672e8875cd23fdaff
    - path: corpus/dev.spacy
      md5: 9107df3da62b0fdbce68c3d35a23298c
  outs:
    - path: training/model-best
      md5: 33288094bb0ee15274ce816f0665e90a
evaluate:
  cmd: python -m weasel run evaluate
  script:
    - python -m spacy evaluate training/model-best corpus/dev.spacy --output training/metrics.json
  deps:
    - path: corpus/dev.spacy
      md5: 7aae549390702a35dece6095078e1d86
    - path: training/model-best
      md5: 06a1cff0a62cb70c9548c9f3e717c964
  outs:
    - path: training/metrics.json
      md5: d3cf6c5a8f6bdc51f29377d2bdfd9f99
convert:
  cmd: python -m weasel run convert
  script:
    - python scripts/convert.py en assets/train.json corpus/train.spacy
    - python scripts/convert.py en assets/dev.json corpus/dev.spacy
  deps:
    - path: assets/train.json
      md5: 900a80629b83b3d6089ce9cdc7321474
    - path: assets/dev.json
      md5: dad5d6d22e8f6a74adaac9dc05429a19
    - path: scripts/convert.py
      md5: 57f39f51cd11b9964a3bdc1c44cba07b
  outs:
    - path: corpus/train.spacy
      md5: 7b030d002626686672e8875cd23fdaff
    - path: corpus/dev.spacy
      md5: 9107df3da62b0fdbce68c3d35a23298c
